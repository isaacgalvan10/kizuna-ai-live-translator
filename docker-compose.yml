version: '3.8'

services:
  # 1. THE DATABASE (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: kizuna_db
    restart: always
    environment:
      - POSTGRES_USER={$POSTGRES_USER}
      - POSTGRES_PASSWORD={$POSTGRES_PASSWORD}
      - POSTGRES_DB={$POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d kizuna_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. THE BACKEND (FastAPI)
  backend:
    build: ./backend
    container_name: kizuna_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be ready before starting
      redis:
        condition: service_started
    environment:
      # The Connection String: postgresql+asyncpg://USER:PASS@HOST:PORT/DB_NAME
      # Note: Host is 'db' (the service name above), not 'localhost'
      - DATABASE_URL=postgresql+asyncpg://{$POSTGRES_USER}:{$POSTGRES_PASSWORD}@db:5432/{$POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - AZURE_SPEECH_KEY={$AZURE_SPEECH_KEY}
      - AZURE_SPEECH_REGION={$AZURE_SPEECH_REGION}

  # 3. THE CACHE (Redis)
  redis:
    image: "redis:alpine"
    container_name: kizuna_redis
    ports:
      - "6379:6379"

  # 4. THE FRONTEND (Vite React)
  frontend:
    build: ./frontend
    container_name: kizuna_frontend
    environment:
      - WATCHPACK_POLLING=true # Fix for hot-reload on Windows/Docker
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: